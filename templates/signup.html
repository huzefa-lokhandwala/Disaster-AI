<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – DisasterPrep</title>
  <meta name="description" content="Create your DisasterPrep account to start learning disaster preparedness"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛑️</text></svg>"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-bg-particles" id="particles"></div>

  <div class="auth-card" style="max-width:500px;">
    <div class="auth-logo">
      <span class="logo-icon">⛑️</span>
      <h1>DisasterPrep</h1>
      <p>Join thousands of prepared students</p>
    </div>

    <div class="auth-form">
      <h2>Create Account</h2>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" class="form-control" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" class="form-control" placeholder="Min 6 characters" autocomplete="new-password"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label for="city">City</label>
          <select id="city" class="form-control">
            <option>Mumbai</option><option>Delhi</option><option>Chennai</option>
            <option>Kolkata</option><option>Bangalore</option><option>Hyderabad</option>
            <option>Pune</option><option>Ahmedabad</option><option>Jaipur</option>
            <option>Surat</option><option>Lucknow</option><option>Kochi</option>
          </select>
        </div>
        <div class="form-group">
          <label for="role">Role</label>
          <select id="role" class="form-control">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary btn-full btn-lg" id="signupBtn" onclick="doSignup()">
        🚀 Create Account
      </button>
      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-muted)">
        Already have an account? <a href="/login" style="color:var(--primary);font-weight:600;">Sign in →</a>
      </p>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
  const pc=document.getElementById('particles');
  for(let i=0;i<12;i++){
    const p=document.createElement('div');p.className='particle';
    const s=20+Math.random()*60;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${6+Math.random()*6}s`;
    pc.appendChild(p);
  }
  function showToast(msg,type='error'){
    const icons={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
    const t=document.createElement('div');t.className=`toast toast-${type}`;
    t.innerHTML=`<span>${icons[type]}</span> ${msg}`;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>t.remove(),4000);
  }
  async function doSignup(){
    const btn=document.getElementById('signupBtn');
    const name=document.getElementById('name').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const city=document.getElementById('city').value;
    const role=document.getElementById('role').value;
    if(!name||!email||!password){showToast('All fields are required','warning');return;}
    if(password.length<6){showToast('Password must be at least 6 characters','warning');return;}
    btn.disabled=true;btn.textContent='Creating account…';
    try{
      const r=await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,city,role})});
      const d=await r.json();
      if(r.ok){
        showToast('Account created! Redirecting…','success');
        setTimeout(()=>window.location.href=d.role==='admin'?'/admin':'/dashboard',800);
      }else{
        showToast(d.error||'Signup failed','error');
        btn.disabled=false;btn.innerHTML='🚀 Create Account';
      }
    }catch{
      showToast('Network error. Try again.','error');
      btn.disabled=false;btn.innerHTML='🚀 Create Account';
    }
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
</script>
</body>
</html>
